name: coffe_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  google_sign_in: ^7.0.0
  cloud_firestore: ^6.0.0
  cached_network_image: ^3.3.1
  provider: ^6.1.2
  image_picker: ^1.2.2
  http: ^1.6.0
  permission_handler: ^12.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  webview_flutter: ^4.13.1
  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.9


flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logoXD.jpeg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
